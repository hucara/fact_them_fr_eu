name: Build static claim pages

# Triggered manually from the Actions tab.
# After adding new claims to Supabase, run this workflow to regenerate
# the /claim/* static pages and update sitemap.xml.
on:
  workflow_dispatch:

permissions:
  contents: write   # needed to commit & push generated files

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate claim pages + sitemap
        env:
          SUPABASE_URL:  ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON: ${{ secrets.SUPABASE_ANON }}
        run: python build_claims.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add claim/ sitemap.xml
          # only commit if something actually changed
          git diff --cached --quiet || \
            git commit -m "build: regenerate static claim pages [skip ci]"
          git push
