  <style>
    .blog-page {
      flex: 1;
      max-width: 760px;
      margin: 0 auto;
      width: 100%;
      padding: 4rem 1.75rem 5rem;
    }

    .blog-page h1 {
      font-size: 1.6rem;
      font-weight: 900;
      letter-spacing: -.03em;
      background: linear-gradient(135deg, #ffe566 0%, #ffcc00 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: .25rem;
    }

    .blog-page .blog-subtitle {
      font-size: .85rem;
      color: var(--c-text-muted);
      margin-bottom: 3rem;
    }

    .blog-post {
      margin-bottom: 3rem;
    }

    .blog-post time {
      display: block;
      font-size: .72rem;
      color: var(--c-text-muted);
      text-transform: uppercase;
      letter-spacing: .1em;
      margin-bottom: .5rem;
    }

    .blog-post h2 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--c-text);
      margin-bottom: .6rem;
    }

    .blog-post p {
      font-size: .95rem;
      line-height: 1.8;
      color: var(--c-text);
      margin-bottom: .75rem;
    }

    .blog-post ul {
      list-style: none;
      padding: 0;
      margin: 0 0 .75rem;
    }

    .blog-post ul li {
      font-size: .95rem;
      line-height: 1.8;
      color: var(--c-text);
      padding-left: 1.25rem;
      position: relative;
    }

    .blog-post ul li::before {
      content: '·';
      position: absolute;
      left: 0;
      color: var(--c-accent);
      font-weight: 700;
    }

    .blog-post a {
      color: var(--c-accent);
      text-decoration: none;
      border-bottom: 1px solid rgba(255, 204, 0, .35);
    }

    .blog-post a:hover {
      border-color: var(--c-accent);
    }

    .blog-divider {
      height: 1px;
      background: var(--c-border);
      margin: 2.5rem 0;
    }

    .blog-empty {
      font-size: .95rem;
      color: var(--c-text-muted);
      padding: 2rem 0;
    }
  </style>
</head>

    </p>

      });
